<!DOCTYPE html>
<html>
<head>
  <title>Activity Reminder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body id="body">

<div class="container">

  <h1>Activity Reminder</h1>

  <p class="info">
    This app tracks your movement using your phone sensors.
    It detects when you are walking, still, or unbalanced and provides helpful reminders.
  </p>

  <button id="startBtn" onclick="startTracking()">Start Tracking</button>

  <div class="card">
    <p id="steps">Steps: 0</p>
    <p id="timer">Time: 0s</p>
    <p id="status">Status: Waiting...</p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
