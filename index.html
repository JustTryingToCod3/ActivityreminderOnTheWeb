<!DOCTYPE html>
<html>
<head>
  <title>Activity Reminder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body id="body">

<div class="container">

  <h1>Activity Reminder</h1>

  <p class="info">
    This app uses your phone’s motion sensors to detect movement, steps, and balance.
    Tap "Start Tracking" and allow permissions to begin.
  </p>

  <button id="startBtn" onclick="startTracking()">Start Tracking</button>

  <div class="card">
    <p id="steps">Steps: 0</p>
    <p id="timer">Time: 0s</p>
    <p id="status">Status: Waiting...</p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
