<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Reminder</title>
<link rel="stylesheet" href="style.css">
</head>

<body id="body">

<div class="app">

  <!-- HOME -->
  <div id="homeScreen" class="screen active">
    <h1>Activity Reminder</h1>

    <p class="info">
      This app tracks your movement using phone sensors and guides exercises. 
      Remember to hit START TRACKING Before doing any OTHER ACTIVITIES.
    </p>

    <div class="button-group">
      <button onclick="startTracking()">Start Tracking</button>
      <button onclick="stopTracking()">Stop Tracking</button>
      <button onclick="showActivities()">Other Activities</button>
      <button onclick="clearData()">Clear Data</button>
    </div>

    <div class="card">
      <p id="steps">Steps: 0</p>
      <p id="timer">Time: 0s</p>
      <p id="status">Status: Waiting...</p>
    </div>
  </div>

  <!-- ACTIVITIES -->
  <div id="activityScreen" class="screen">
    <h2>Select Activity</h2>

    <div class="button-group">
      <button onclick="startExercise('Squats')">Squats</button>
      <button onclick="startExercise('Jumping Jacks')">Jumping Jacks</button>
      <button onclick="startExercise('Pushups')">Pushups</button>
      <button onclick="startStretch()">Stretch</button>
    </div>
  </div>

  <!-- EXERCISE -->
  <div id="exerciseScreen" class="screen">
    <h2 id="exerciseTitle"></h2>

    <div class="card">
      <p id="counter"></p>
      <p id="exerciseStatus">Get ready...</p>

      <div class="button-group">
        <button id="beginBtn" onclick="beginAction()">BEGIN</button>
        <button id="pauseBtn" onclick="togglePause()">Pause</button>
      </div>
    </div>
  </div>

</div>

<button id="homeBtn" onclick="goHome()">🏠 Home</button>

<script src="script.js"></script>
</body>
</html>
