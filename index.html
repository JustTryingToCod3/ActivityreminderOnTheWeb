<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity Reminder</title>
<link rel="stylesheet" href="style.css">
</head>

<body id="body">

<!-- Home button always visible -->
<button id="homeBtn" onclick="goHome()">🏠 Home</button>

<div class="app">

  <!-- HOME SCREEN -->
  <div id="homeScreen" class="screen active">

    <h1>Activity Reminder</h1>

    <p class="info">
      This app uses your phone’s sensors to track movement, detect activity,
      and guide you through exercises. Tap start to begin.
    </p>

    <div class="button-group">
      <button onclick="startTracking()">Start Tracking</button>
      <button onclick="stopTracking()">Stop Tracking</button>
      <button onclick="showActivities()">Other Activities</button>
    </div>

    <div class="card">
      <p id="steps">Steps: 0</p>
      <p id="timer">Time: 0s</p>
      <p id="status">Status: Waiting...</p>
    </div>

  </div>

  <!-- ACTIVITY SCREEN -->
  <div id="activityScreen" class="screen">
    <h2>Select Activity</h2>

    <div class="button-group">
      <button onclick="startExercise('squats')">Squats</button>
      <button onclick="startExercise('jumping')">Jumping Jacks</button>
      <button onclick="startExercise('pushups')">Pushups</button>
      <button onclick="startExercise('stretch')">Stretch</button>
    </div>
  </div>

  <!-- EXERCISE SCREEN -->
  <div id="exerciseScreen" class="screen">
    <h2 id="exerciseTitle"></h2>

    <div class="card">
      <p id="counter">0 / 10</p>
      <p id="exerciseStatus">Get ready...</p>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
